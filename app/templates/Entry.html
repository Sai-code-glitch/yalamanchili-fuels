{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Daily Shift Report - Yalamanchili Fuels</h4>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Date</label>
                    <input type="date" name="date" class="form-control" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Fuel Type</label>
                    <select name="fuel_id" class="form-select">
                        {% for fuel in fuels %}
                        <option value="{{ fuel.id }}">{{ fuel.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label">Opening Meter</label>
                        <input type="number" step="0.01" name="opening" class="form-control" placeholder="0.00">
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label">Closing Meter</label>
                        <input type="number" step="0.01" name="closing" class="form-control" placeholder="0.00">
                    </div>
                </div>

                <div class="row border-top pt-3">
                    <div class="col-6 mb-3">
                        <label class="form-label">Cash Collected (₹)</label>
                        <input type="number" name="cash" class="form-control">
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label">Digital/UPI (₹)</label>
                        <input type="number" name="digital" class="form-control">
                    </div>
                </div>

                <button type="submit" class="btn btn-success w-100 mt-3">Submit Daily Log</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
