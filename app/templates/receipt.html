{% extends "base.html" %}
{% block content %}
<div class="container">
    <div class="card shadow-sm border-0 border-start border-primary border-5">
        <div class="card-body">
            <h3><i class="bi bi-truck me-2"></i> Tanker Unloading Log</h3>
            <p class="text-muted">Record new fuel arrivals from Hindustan Petroleum Corp.</p>
            <hr>
            <form action="/receipt" method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Date of Arrival</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Fuel Type</label>
                        <select name="fuel_id" class="form-select">
                            {% for fuel in fuels %}
                            <option value="{{ fuel.id }}">{{ fuel.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>Quantity (Ltrs)</label>
                        <input type="number" step="0.1" name="quantity" class="form-control" placeholder="e.g. 12000" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>HP Invoice #</label>
                        <input type="text" name="invoice" class="form-control" placeholder="HP-2026-XXXX">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>Observed Density</label>
                        <input type="number" step="0.0001" name="density" class="form-control" placeholder="e.g. 0.8245">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary mt-3">Confirm Receipt</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
