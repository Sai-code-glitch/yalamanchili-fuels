<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Y-FUELS PRO | HP Gateway</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --hp-blue: #003399;
            --hp-red: #E31E24;
            --sidebar-width: 260px;
            --bg-gray: #f4f7fa;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-gray); }
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            background: linear-gradient(180deg, #001a4d 0%, #000c24 100%);
            color: white;
            z-index: 1000;
            border-right: 3px solid var(--hp-red);
        }
        .nav-link {
            color: rgba(255,255,255,0.7);
            padding: 12px 20px;
            transition: 0.3s;
        }
        .nav-link.active {
            background: var(--hp-blue);
            color: white;
            border-left: 4px solid var(--hp-red);
        }
        .main-content { margin-left: var(--sidebar-width); padding: 30px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="sidebar d-flex flex-column">
        <h4 class="p-4 fw-bold">Y-FUELS <span class="badge bg-danger" style="font-size: 10px;">PRO</span></h4>
        <nav class="nav flex-column mt-2">
            <a href="{{ url_for('home') }}" class="nav-link {% if request.path == '/' %}active{% endif %}">
                <i class="bi bi-cpu me-2"></i> Dashboard
            </a>
            <a href="{{ url_for('daily_entry') }}" class="nav-link">
                <i class="bi bi-pencil-square me-2"></i> Meter Entry
            </a>
            <a href="{{ url_for('view_records') }}" class="nav-link">
                <i class="bi bi-database-check me-2"></i> Sales Ledger
            </a>
        </nav>
        <div class="mt-auto p-4 border-top border-secondary">
            <div class="d-flex align-items-center">
                <i class="bi bi-person-circle fs-4 me-2 text-danger"></i>
                <div>
                    <small class="d-block text-secondary text-uppercase">Admin</small>
                    <strong class="small">Ajay Kumar</strong>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
